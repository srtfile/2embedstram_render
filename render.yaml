services:
  - type: web
    name: 2embed-stream-resolver
    env: python
    buildCommand: "pip install -r requirements.txt && playwright install chromium && playwright install-deps"
    startCommand: "gunicorn resolver:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.cache/ms-playwright
    healthCheckPath: /health
